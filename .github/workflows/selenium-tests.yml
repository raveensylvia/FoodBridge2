name: E2E Tests & Report Generation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
    # ── 1. Checkout ───────────────────────────────────────────────
    - name: Checkout code
      uses: actions/checkout@v4

    # ── 2. Runtimes ───────────────────────────────────────────────
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # ── 3. Chrome (pre-installed on ubuntu-latest) ────────────────
    - name: Verify Chrome is available
      run: |
        which google-chrome || which google-chrome-stable || which chromium-browser || echo "Chrome not found, installing..."
        if ! command -v google-chrome &>/dev/null && ! command -v google-chrome-stable &>/dev/null; then
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb 2>/dev/null || true
        fi
        CHROME_BIN=$(which google-chrome-stable || which google-chrome || which chromium-browser || echo "")
        echo "CHROME_BIN=$CHROME_BIN" >> $GITHUB_ENV
        $CHROME_BIN --version || echo "Chrome version check skipped"

    - name: Install ChromeDriver via npm selenium-webdriver manager
      run: |
        # Install chromedriver that matches system Chrome using npx
        CHROME_VER=$(google-chrome-stable --version 2>/dev/null | grep -oP '\d+' | head -1 \
                  || google-chrome --version 2>/dev/null | grep -oP '\d+' | head -1 \
                  || echo "latest")
        echo "Chrome major version: $CHROME_VER"
        # Install matching chromedriver globally so it's on PATH
        npm install -g chromedriver@latest 2>/dev/null || true
        which chromedriver && chromedriver --version || echo "chromedriver on PATH not found (Selenium Manager will handle it)"
        echo "CHROMEWEBDRIVER=$(which chromedriver 2>/dev/null || echo '')" >> $GITHUB_ENV

    # ── 4. Install Python dependencies ───────────────────────────
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install flask flask-cors flask-jwt-extended flask-bcrypt flask-sqlalchemy
        pip install openpyxl requests
        pip install "Appium-Python-Client>=2.0.0" pytest

    # ── 5. Install Node dependencies ──────────────────────────────
    - name: Install frontend dependencies
      run: cd frontend && npm install --legacy-peer-deps
      continue-on-error: true

    - name: Install Selenium test dependencies
      run: cd selenium-tests && npm install --legacy-peer-deps
      continue-on-error: true

    # ── 6. Start Flask backend ────────────────────────────────────
    - name: Start Flask backend
      run: |
        cd backend
        python app.py > ../backend.log 2>&1 &
        echo $! > ../backend.pid
        echo "Started backend PID $(cat ../backend.pid)"
        sleep 4

    - name: Wait for Flask backend (port 5000)
      run: |
        echo "Probing backend at http://127.0.0.1:5000 ..."
        READY=0
        for i in $(seq 1 30); do
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
                  -X POST http://127.0.0.1:5000/api/auth/login \
                  -H "Content-Type: application/json" \
                  -d '{"email":"ci@ci.com","password":"ci"}' \
                  --connect-timeout 2 --max-time 3 2>/dev/null)
          echo "  attempt $i → HTTP $HTTP"
          if [ "$HTTP" != "000" ] && [ -n "$HTTP" ]; then
            echo "Backend is ready (HTTP $HTTP)"
            READY=1
            break
          fi
          sleep 2
        done
        if [ "$READY" -eq 0 ]; then
          echo "WARNING: backend did not respond after 60s — continuing anyway"
          cat ../backend.log || true
        fi

    # ── 7. Start Vite frontend ────────────────────────────────────
    - name: Start Vite frontend
      run: |
        cd frontend
        npx vite --host 0.0.0.0 --port 5173 > ../frontend.log 2>&1 &
        echo $! > ../frontend.pid
        echo "Started frontend PID $(cat ../frontend.pid)"
        sleep 6
      continue-on-error: true

    - name: Wait for Vite frontend (port 5173)
      run: |
        echo "Probing frontend at http://127.0.0.1:5173 ..."
        for i in $(seq 1 30); do
          if curl -sf http://127.0.0.1:5173 --connect-timeout 2 --max-time 3 -o /dev/null 2>/dev/null; then
            echo "Frontend is ready (attempt $i)"
            break
          fi
          echo "  attempt $i/30 — waiting..."
          sleep 2
        done
        echo "=== Frontend log ==="
        cat ../frontend.log 2>/dev/null || cat frontend.log 2>/dev/null || echo "(no frontend.log)"
      continue-on-error: true

    # ── 8. Selenium Web E2E Tests ─────────────────────────────────
    - name: Run Selenium Web E2E Tests
      run: |
        cd selenium-tests
        npm test
      continue-on-error: true
      env:
        CHROMEWEBDRIVER: ${{ env.CHROMEWEBDRIVER }}
        CHROME_PATH: ${{ env.CHROME_BIN }}

    # ── 9. Appium Mobile E2E Tests ────────────────────────────────
    - name: Run Appium Mobile E2E Tests
      run: |
        cd appium-python-tests
        python run_tests.py
      continue-on-error: true

    # ── 10. Generate aggregated reports + GitHub Step Summary ─────
    - name: Generate Aggregated Reports and GitHub Step Summary
      if: always()
      run: python generate_reports.py
      continue-on-error: true

    # ── 11. Print server logs ──────────────────────────────────────
    - name: Print server logs
      if: always()
      run: |
        echo "====== BACKEND LOG ======"
        cat backend.log  2>/dev/null || echo "(no backend.log)"
        echo ""
        echo "====== FRONTEND LOG ======"
        cat frontend.log 2>/dev/null || echo "(no frontend.log)"

    # ── 12. Upload all artifacts ──────────────────────────────────
    - name: Upload Test Reports and Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-reports
        path: |
          reports/
          selenium-tests/reports/
          appium-python-tests/reports/
          .web_results.json
          appium-python-tests/.pytest_results.json
          backend.log
          frontend.log
        if-no-files-found: warn
