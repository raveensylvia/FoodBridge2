name: E2E Tests & Report Generation

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install All Dependencies
      run: |
        echo "Installing backend dependencies..."
        cd backend
        pip install -r requirements.txt
        
        echo "Installing frontend dependencies..."
        cd ../frontend
        npm install
        
        echo "Installing Selenium test dependencies..."
        cd ../selenium-tests
        npm install
        
        echo "Installing Appium Python test dependencies..."
        cd ../appium-python-tests
        pip install -r requirements.txt

    - name: Run E2E Tests and Generate Reports
      run: |
        echo "Starting backend..."
        cd backend
        nohup python app.py > ../backend.log 2>&1 &
        
        echo "Starting frontend..."
        cd ../frontend
        nohup npm run dev > ../frontend.log 2>&1 &
        
        echo "Waiting for servers to be ready..."
        cd ..
        npx wait-on http://localhost:5000 http://localhost:5173 -t 60000
        
        echo "Running Selenium Web E2E Tests..."
        cd selenium-tests
        SELENIUM_EXIT=0
        npm test || SELENIUM_EXIT=$?
        
        echo "Running Appium Mobile E2E Tests..."
        cd ../appium-python-tests
        APPIUM_EXIT=0
        python run_tests.py || APPIUM_EXIT=$?
        
        echo "Generating aggregated reports..."
        cd ..
        python generate_reports.py || true
        
        # Exit with failure if either test suite failed
        if [ "$SELENIUM_EXIT" -ne 0 ] || [ "$APPIUM_EXIT" -ne 0 ]; then
          echo "Test execution failed! Selenium exit code: $SELENIUM_EXIT, Appium exit code: $APPIUM_EXIT"
          exit 1
        fi

    - name: Upload Test Reports & Logs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: e2e-test-reports
        path: |
          reports/
          .web_results.json
          appium-python-tests/.pytest_results.json
          backend.log
          frontend.log
